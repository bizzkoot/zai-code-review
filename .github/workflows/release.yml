name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Get current version
        id: version
        run: |
          VERSION=$(cat package.json | grep '"version"' | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog section for version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Find the section for this version in CHANGELOG.md
          # Look for "## [VERSION]" and extract content until next "## [" or end
          SECTION=$(awk -v ver="$VERSION" '
            /^\#\# \[/ {
              gsub(/[\[\]]/, "", $2)
              if ($2 == ver) {
                found=1
                next
              } else if (found) {
                exit
              }
            }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)
          
          if [ -z "$SECTION" ]; then
            # No CHANGELOG section, fallback to git commits
            LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              SECTION=$(git log "$LAST_TAG..HEAD" --pretty='- %s' 2>/dev/null || echo "")
            else
              SECTION="Release $VERSION"
            fi
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$SECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git revparse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Tag and Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG.md with release section and link
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Check if section already exists
          if grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "Version section already exists in CHANGELOG.md"
            exit 0
          fi
          
          # Get the date for the release
          DATE=$(date +%Y-%m-%d)
          
          # Get last tag for changelog content
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # Parse commit messages into categories
          ADDED=""
          CHANGED=""
          FIXED=""
          
          if [ -n "$LAST_TAG" ]; then
            while IFS= read -r line; do
              # Remove the '- ' prefix
              msg="${line#- }"
              
              # Categorize by prefix
              case "$msg" in
                feat:*|feature:*|*add*|*new*)
                  ADDED="${ADDED}- ${msg}\n"
                  ;;
                fix:*|*bug*|*fix*)
                  FIXED="${FIXED}- ${msg}\n"
                  ;;
                *)
                  CHANGED="${CHANGED}- ${msg}\n"
                  ;;
              esac
            done < <(git log "$LAST_TAG..HEAD" --pretty='- %s' 2>/dev/null)
          fi
          
          # Build the new section
          NEW_SECTION="## [$VERSION] - $DATE"
          
          # Add categories if they have content
          if [ -n "$ADDED" ]; then
            NEW_SECTION="$NEW_SECTION\n\n### Added\n${ADDED}"
          fi
          if [ -n "$CHANGED" ]; then
            NEW_SECTION="$NEW_SECTION\n### Changed\n${CHANGED}"
          fi
          if [ -n "$FIXED" ]; then
            NEW_SECTION="$NEW_SECTION\n### Fixed\n${FIXED}"
          fi
          
          # If no categorized content, add as generic
          if [ -z "$ADDED" ] && [ -z "$CHANGED" ] && [ -z "$FIXED" ]; then
            NEW_SECTION="$NEW_SECTION\n\n### Changed\n$(git log "$LAST_TAG..HEAD" --pretty='- %s' 2>/dev/null)"
          fi
          
          # Build the link line
          LINK="[$VERSION]: https://github.com/${{ github.repository }}/releases/tag/v$VERSION"
          
          # Insert section before the last link line (e.g., [0.0.1]: ...)
          # If no previous links exist, append before EOF
          if grep -q '^\[.*\]: https://github.com/' CHANGELOG.md; then
            # Insert before the last link line
            sed -i "/^\[.*\]: https:\/\/github.com\/${{ github.repository }}\/releases\/tag\//i\\$NEW_SECTION\n$LINK\n" CHANGELOG.md
          else
            # No existing links, append at end
            echo -e "\n$NEW_SECTION\n\n$LINK" >> CHANGELOG.md
          fi
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add CHANGELOG.md
          git commit -m "docs: add changelog section and release link for v$VERSION"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
